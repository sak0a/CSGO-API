server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    location /api/ {
        default_type application/json;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=300";
        try_files $uri $uri/ =404;
    }

    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
